# ============================================
# JavHub - Docker Compose 部署配置
# ============================================
# 一键启动: docker-compose up -d
# 查看日志: docker-compose logs -f
# 停止服务: docker-compose down
# ============================================

services:
  # ------------------------------------------
  # PostgreSQL 数据库
  # ------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: javhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kongmei
      POSTGRES_PASSWORD: ${DB_PASSWORD:-javhub123}
      POSTGRES_DB: r18
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 可选：初始化脚本目录，放置 .sql 或 .sh 文件自动执行
      # - ./initdb:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kongmei -d r18"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------
  # JavInfoApi (Go 元数据 API)
  # ------------------------------------------
  javinfoapi:
    build:
      context: ./JavInfoApi
      dockerfile: Dockerfile
    container_name: javhub-javinfoapi
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: kongmei
      DB_PASSWORD: ${DB_PASSWORD:-javhub123}
      DB_NAME: r18
      DB_MAX_CONN: "20"
      DB_MIN_CONN: "5"
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/videos?page=1&page_size=1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ------------------------------------------
  # JavHub 后端 (Python FastAPI)
  # ------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: javhub-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    working_dir: /app
    environment:
      # JavInfoApi 地址 (容器内用服务名)
      JAVINFO_API_URL: http://javinfoapi:8080
      # Metatube 服务地址
      METATUBE_HOST: ${METATUBE_HOST:-154.23.255.204}
      METATUBE_PORT: ${METATUBE_PORT:-8081}
      METATUBE_TOKEN: ${METATUBE_TOKEN:-}
    ports:
      - "8000:8000"
    depends_on:
      javinfoapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ------------------------------------------
  # JavHub 前端 (Nginx)
  # ------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: javhub-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

# ============================================
# 网络定义
# ============================================
networks:
  default:
    name: javhub-network
    driver: bridge

# ============================================
# 卷定义
# ============================================
volumes:
  postgres_data:
    name: javhub-postgres-data
